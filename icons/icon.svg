<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100">
  <!-- App background -->
  <rect width="100" height="100" rx="20" fill="#1a1108"/>

  <!-- Document body -->
  <path d="M22 14 L60 14 L76 30 L76 86 L22 86 Z"
        fill="#2a1f00" stroke="#f5a623" stroke-width="3.5"
        stroke-linejoin="round" stroke-linecap="round"/>

  <!-- Folded corner detail -->
  <path d="M60 14 L60 30 L76 30"
        fill="none" stroke="#f5a623" stroke-width="3.5"
        stroke-linejoin="round" stroke-linecap="round"/>

  <!-- Top text line (solid — original name) -->
  <line x1="32" y1="44" x2="66" y2="44"
        stroke="#f5a623" stroke-width="3"
        stroke-linecap="round" opacity="0.95"/>

  <!-- Middle text line -->
  <line x1="32" y1="55" x2="58" y2="55"
        stroke="#f5a623" stroke-width="3"
        stroke-linecap="round" opacity="0.6"/>

  <!-- Bottom: dashed source → arrow head (rename metaphor) -->
  <line x1="32" y1="68" x2="52" y2="68"
        stroke="#f5a623" stroke-width="3"
        stroke-linecap="round" stroke-dasharray="5 3.5"
        opacity="0.9"/>
  <!-- Arrow head pointing right -->
  <polyline points="50,63 57,68 50,73"
            fill="none" stroke="#f5a623" stroke-width="3"
            stroke-linecap="round" stroke-linejoin="round"/>
</svg>
